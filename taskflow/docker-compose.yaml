version: '3.9'

services:
  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    container_name: taskflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: taskflow
      POSTGRES_USER: taskflow_user
      POSTGRES_PASSWORD: taskflow_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskflow_user -d taskflow"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - taskflow_net

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taskflow_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: taskflow
      DB_USER: taskflow_user
      DB_PASSWORD: taskflow_password
      JWT_SECRET: change_me_in_production_please_use_long_random_string
      JWT_EXPIRES_IN: 7d
      JWT_REFRESH_SECRET: change_me_refresh_secret_too
      JWT_REFRESH_EXPIRES_IN: 30d
      FRONTEND_URL: http://localhost
      # Optional Google OAuth — add your credentials here
      # GOOGLE_CLIENT_ID: your_google_client_id
      # GOOGLE_CLIENT_SECRET: your_google_client_secret
      # GOOGLE_CALLBACK_URL: http://localhost/api/auth/google/callback
    ports:
      - "5000:5000"
    networks:
      - taskflow_net

  # Database migrations + seed runner
  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taskflow_migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: taskflow
      DB_USER: taskflow_user
      DB_PASSWORD: taskflow_password
    command: sh -c "node src/utils/migrate.js && node src/utils/seed.js"
    networks:
      - taskflow_net
    restart: "no"

  # Frontend (React + Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: taskflow_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - taskflow_net

volumes:
  postgres_data:

networks:
  taskflow_net:
    driver: bridge
